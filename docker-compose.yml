services:
  backend:
    build:
      context: ./backend
    container_name: runtrack-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: runtrack-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
